<body>

<div class="container">
    <div id="page-start" class="text-center space-y-8 mt-10">
        <div class="card p-8 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-300 rounded-full opacity-50 -z-10"></div>
            
            <h1 class="title">食物人格测试</h1>
            <div class="text-left text-gray-700 space-y-4 mb-8 leading-relaxed font-medium">
                <p>如果把人与食物的关系看作一种性格，每个人都会有自己的 “食物人格”。</p>
                <p>有人是风味的侦探，在味道里觉察情绪。</p>
                <p>有人是节律的守护者，在三餐里建立生活秩序。</p>
                <p>有人是享受当下的美食家，也有人在餐桌上思考生活的意义。</p>
                <p>还有人，把一餐一饭变成连接人与人的方式。</p>
                <p>接下来的18道生活场景选择，没有标准答案，也没有对错。</p>
                <p>请跟随你的第一反应选择答案。</p>
                <p>整个测试大约需要2–3分钟完成。</p>
            </div>
            <button id="start-btn" class="btn-action bg-orange-500 text-white text-xl px-12 py-4 rounded-full font-bold hover:bg-orange-600">
                开启发现之旅
            </button>
        </div>
    </div>

    <div id="page-test">
        <div class="card p-6">
            <div class="flex justify-between items-end mb-4">
                <span class="title-font text-2xl text-orange-500">Q<span id="q-num">1</span></span>
                <div class="progress-bar-container w-2/3">
                    <div class="progress-title">
                        <span id="progress-number" class="progress-number">1/18</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress" class="w-0"></div>
                    </div>
                </div>
            </div>

            <div id="q-dim" class="dim-tag hidden"></div>
            <h2 id="q-text" class="text-xl font-bold text-gray-800 mb-8 min-h-[3rem]"></h2>
            
            <div id="options" class="space-y-4 mb-10"></div>

            <div class="flex justify-between gap-4">
                <button onclick="prev()" id="btn-prev" class="btn-action flex-1 py-3 rounded-xl font-bold bg-white text-gray-600">上一题</button>
            </div>
        </div>
    </div>

    <div id="page-result">
        <div class="card p-6 text-center">
            <h2 class="title-font text-4xl mb-2 text-gray-800">你的食物人格报告</h2>
            <p class="text-gray-400 text-sm mb-8">基于你的潜意识多维度分析</p>

            <div class="flex flex-wrap justify-center gap-4 mb-10">
                <div class="card main-person-card text-white person-card -rotate-2">
                    <div class="person-title title-font">主人格</div>
                    <div id="p1" class="person-name"></div>
                    <div id="p1-dim" class="person-dim"></div>
                </div>
                <div id="sub-person-card" class="card sub-person-card text-white person-card rotate-2">
                    <div class="person-title title-font">副人格</div>
                    <div id="p2" class="person-name"></div>
                    <div id="p2-dim" class="person-dim"></div>
                </div>
            </div>

            <div class="card" style="padding: 15px; position: relative; z-index: 1;">
                <div class="radar-container">
                    <canvas id="radar"></canvas>
                </div>
            </div>

            <div id="main-desc" class="text-left space-y-6 mb-10"></div>

            <div class="text-left mb-6">
                <h3 class="title-font text-xl flex items-center mb-4">
                    <span class="w-8 h-8 bg-black text-white rounded-full inline-flex items-center justify-center mr-2 text-sm hidden"></span>
                    其他维度解析
                </h3>
                <div id="dim-detail" class="grid gap-4"></div>
            </div>

            <div id="food-magic" class="magic-section text-left mb-10">
                <h3 class="magic-title"><i class="fa fa-magic"></i>食物魔法 | 生活提升指南</h3>
                <div id="magic-content" class="space-y-6"></div>
            </div>

            <button onclick="saveResultImage()" class="btn-action bg-blue-500 text-white py-4 rounded-2xl font-bold text-lg w-full mb-4">
                <i class="fa fa-download mr-2"></i>保存测试结果
            </button>
            
            <button onclick="restart()" class="btn-action w-full bg-orange-500 text-white py-4 rounded-2xl font-bold text-lg">
                重新探索
            </button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        window.scrollTo(0, 0);
    }, 100);
    
    document.getElementById('start-btn').addEventListener('click', startTest);
    document.getElementById('start-btn').addEventListener('touchstart', function(e) {
        e.preventDefault();
        startTest();
    }, {passive: false});
});

function shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

const foodMagicTips = {
    "味蕾感知者": {
        strength: "发挥你的味蕾敏感度优势",
        strengthTips: [
            { item: "分享味觉体验", desc: "把你的味觉感受分享给身边的人，推荐好吃的餐厅或食材，让更多人感受到食物的美好。" },
            { item: "成为餐桌品鉴师", desc: "聚餐时可以主动分享对菜品的品鉴感受，提升用餐的趣味性和层次感。" },
            { item: "尝试轻烹饪", desc: "选择简单的烹饪方式（如清蒸、白灼），更好地发挥你的味觉优势，感受食材本身的味道。" }
        ],

// 核心调整：维度解读函数（适配7-10/4-6/0-3区间）

    }
  }

    } else {

  return {title, text, level};
}

function generateFoodMagic() {
    const magicContent = document.getElementById("magic-content");
    let html = '';
    
    const sortedDims = Object.entries(dimScores).sort((a, b) => b[1] - a[1]);
    const highestDim = sortedDims[0];
    const lowestDim = sortedDims[sortedDims.length - 1];
    
    if (highestDim[0] === lowestDim[0]) {
        html += `<div class="mb-4">
            <h4 class="font-bold text-lg text-orange-600 mb-2">✨ 均衡发展：保持你的食物人格平衡</h4>
            <div class="magic-item">
                <div class="magic-item-title">保持多元体验</div>
                <div class="magic-item-desc">你的各维度发展均衡，建议继续保持多元的饮食体验，偶尔尝试跳出舒适区，让食物人格更加丰富立体。</div>
            </div>
            <div class="magic-item">
                <div class="magic-item-title">定期自我觉察</div>
                <div class="magic-item-desc">每月花一点时间回顾自己的饮食选择和习惯，觉察不同场景下的饮食偏好变化，保持与食物的健康关系。</div>
            </div>
        </div>`;
    } else {
        const highestPerson = personMap[highestDim[0]];
        const highestTips = foodMagicTips[highestPerson];
        
        html += `<div class="magic-strength mb-6">
            <h4 class="font-bold text-lg text-green-600 mb-2">🌟 你的优势：${highestTips.strength}</h4>
            <div class="space-y-3">`;
        
        highestTips.strengthTips.forEach(tip => {
            html += `<div class="magic-item">
                <div class="magic-item-title">${tip.item}</div>
                <div class="magic-item-desc">${tip.desc}</div>
            </div>`;
        });
        
        html += `</div></div>`;
        
        const lowestPerson = personMap[lowestDim[0]];
        const lowestTips = foodMagicTips[lowestPerson];
        
        html += `<div class="magic-improve">
            <h4 class="font-bold text-lg text-amber-600 mb-2">🌱 可以尝试：${lowestTips.improve}</h4>
            <div class="space-y-3">`;
        
        lowestTips.improveTips.forEach(tip => {
            html += `<div class="magic-item">
                <div class="magic-item-title">${tip.item}</div>
                <div class="magic-item-desc">${tip.desc}</div>
            </div>`;
        });
        
        html += `</div></div>`;
    }
    
    magicContent.innerHTML = html;
}

let currentQ = 0;
let answers = {};
let dimScores = {
  "味蕾亲密度": 0,
  "饮食节律性": 0,
  "饕餮狩猎欲": 0,
  "社交饭友力": 0,
  "食物想象力": 0,
  "美食哲学家": 0
};

function startTest() {
  document.getElementById("page-start").style.display = 'none';
  document.getElementById("page-test").style.display = 'block';
  document.getElementById("page-test").classList.add('active');
  loadQuestion(currentQ);
  window.scrollTo(0, document.getElementById("page-test").offsetTop);
}

function loadQuestion(index) {
  try {
    const q = questions[index];
    document.getElementById("q-num").textContent = (index + 1);
    document.getElementById("q-text").textContent = q.q;
    document.getElementById("q-dim").textContent = q.dim;
    document.getElementById("q-dim").classList.remove("hidden");
    
    const progress = ((index + 1) / questions.length) * 100;
    document.getElementById("progress").style.width = `${progress}%`;
    
    document.getElementById("progress-number").textContent = `${index + 1}/${questions.length}`;
    
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    
    q.realOpts.forEach((opt, optIndex) => {
      const btn = document.createElement("button");
      btn.className = `option-item w-full text-left p-4 rounded-xl font-medium ${answers[index] === optIndex ? 'option-selected' : ''}`;
      btn.textContent = opt.t;
      btn.onclick = () => selectOption(index, optIndex, opt.s, q.dim);
      btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        selectOption(index, optIndex, opt.s, q.dim);
      }, {passive: false});
      optionsContainer.appendChild(btn);
    });
    
    document.getElementById("btn-prev").disabled = index === 0;
    document.getElementById("btn-prev").classList.toggle("opacity-50", index === 0);
    document.getElementById("btn-prev").classList.toggle("cursor-not-allowed", index === 0);
    
  } catch (e) {
    console.error("加载题目出错:", e);
  }
}

function selectOption(qIndex, optIndex, score, dim) {
  answers[qIndex] = optIndex;
  
  const dimQuestions = questions.filter(q => q.dim === dim);
  const dimQIndexes = dimQuestions.map((_, i) => questions.findIndex(q => q.dim === dim && q.q === dimQuestions[i].q));
  
  let dimTotal = 0;
  let dCount = 0;
  
  dimQIndexes.forEach(idx => {
    if (answers[idx] !== undefined) {
      const optScore = questions[idx].realOpts[answers[idx]].s;
      dimTotal += optScore;
      if (optScore === 3) dCount++;
    }
  });
  
  if (dCount === 3) dimTotal += 1;
  
  dimScores[dim] = dimTotal;
  
  document.querySelectorAll(".option-item").forEach((btn, i) => {
    if (i === optIndex) {
      btn.classList.add("option-selected");
    } else {
      btn.classList.remove("option-selected");
    }
  });
  
  setTimeout(() => {
    if (qIndex < questions.length - 1) {
      currentQ = qIndex + 1;
      loadQuestion(currentQ);
      window.scrollTo(0, document.getElementById("page-test").offsetTop);
    } else {
      showResult();
    }
  }, 300);
}

function prev() {
  if (currentQ > 0) {
    currentQ--;
    loadQuestion(currentQ);
    window.scrollTo(0, document.getElementById("page-test").offsetTop);
  }
}

function showResult() {
  document.getElementById("page-test").style.display = 'none';
  document.getElementById("page-test").classList.remove('active');
  document.getElementById("page-result").style.display = 'block';
  document.getElementById("page-result").classList.add('active');
  
  const sortedScores = Object.entries(dimScores).sort((a, b) => b[1] - a[1]);
  
  let p1Dim = sortedScores[0][0];
  let p2Dim = sortedScores[1][0];
  
  const topScore = sortedScores[0][1];
  const topDims = sortedScores.filter(item => item[1] === topScore).map(item => item[0]);
  
  if (topDims.length >= 2) {
    document.getElementById("p1").textContent = `${personMap[topDims[0]]} + ${personMap[topDims[1]]}`;
    document.getElementById("p1-dim").textContent = `${topDims[0]} + ${topDims[1]}`;
    document.getElementById("sub-person-card").style.display = "none";
    // 如果有多个主人格，次人格为空
    p2Dim = null;
  } else {
    document.getElementById("p1").textContent = personMap[p1Dim];
    document.getElementById("p1-dim").textContent = p1Dim;
    document.getElementById("p2").textContent = personMap[p2Dim];
    document.getElementById("p2-dim").textContent = p2Dim;
  }
  
  // 构建主人格和次人格的描述
  let mainDescHtml = `
    <div class="card p-4 bg-orange-50 border-l-4 border-orange-500">
      <h3 class="font-bold text-xl mb-2">${personDesc[personMap[p1Dim]].title}</h3>
      <p class="text-gray-700">${personDesc[personMap[p1Dim]].desc}</p>
    </div>
  `;
  
  // 添加次人格描述（如果有）
  if (p2Dim && p2Dim !== p1Dim) {
    mainDescHtml += `
      <div class="card p-4 bg-orange-100 border-l-4 border-orange-400">
        <h3 class="font-bold text-xl mb-2">${personDesc[personMap[p2Dim]].title}</h3>
        <p class="text-gray-700">${personDesc[personMap[p2Dim]].desc}</p>
      </div>
    `;
  }
  
  document.getElementById("main-desc").innerHTML = mainDescHtml;
  
  const dimDetailContainer = document.getElementById("dim-detail");
  dimDetailContainer.innerHTML = "";
  
  // 只显示除主人格和次人格外的其他4个维度
  Object.entries(dimScores).forEach(([dim, score]) => {
    // 排除主人格和次人格
    if (dim !== p1Dim && dim !== p2Dim) {
      const {title, text} = getDimDesc(dim, score);
      dimDetailContainer.innerHTML += `
        <div class="card p-4 bg-orange-100 border-l-4 border-orange-400">
          <h4 class="font-bold text-lg mb-1">${dim} · ${title}</h4>
          <p class="text-gray-700 text-sm">${text}</p>
        </div>
      `;
    }
  });
  
  generateFoodMagic();
  
  const ctx = document.getElementById('radar').getContext('2d');
  
  if (window.radarChart) {
    window.radarChart.destroy();
  }
  
  window.radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: dimNames,
      datasets: [{
        label: '你的得分',
        data: dimNames.map(dim => dimScores[dim]),
        backgroundColor: 'rgba(249, 115, 22, 0.2)',
        borderColor: 'rgba(249, 115, 22, 1)',
        pointBackgroundColor: 'rgba(249, 115, 22, 1)',
        pointBorderColor: '#fff',
        pointHoverBackgroundColor: '#fff',
        pointHoverBorderColor: 'rgba(249, 115, 22, 1)'
      }]
    },
    options: {
      elements: {
        line: {
          borderWidth: 3
        }
      },
      scales: {
        r: {
          angleLines: {
            display: true,
            color: 'rgba(0, 0, 0, 0.1)'
          },
          suggestedMin: 0,
          suggestedMax: 10,
          ticks: {
            stepSize: 2,
            backdropColor: 'transparent',
            color: '#666'
          },
          pointLabels: {
            font: {
              size: 12,
              weight: 'bold'
            },
            color: '#333'
          },
          grid: {
            color: 'rgba(0, 0, 0, 0.1)'
          }
        }
      },
      plugins: {
        legend: {
          display: false
        }
      },
      maintainAspectRatio: false
    }
  });
  
  window.scrollTo(0, document.getElementById("page-result").offsetTop);
}

function saveResultImage() {
  const resultElement = document.getElementById("page-result");
  
  html2canvas(resultElement, {
    scale: 2,
    useCORS: true,
    logging: false,
    backgroundColor: '#f3eee1'
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `食物人格测试结果_${new Date().getTime()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err => {
    alert('保存失败，请稍后重试！');
    console.error('截图保存失败:', err);
  });
}

function restart() {
  currentQ = 0;
  answers = {};
  dimScores = {
    "味蕾亲密度": 0,
    "饮食节律性": 0,
    "饕餮狩猎欲": 0,
    "社交饭友力": 0,
    "食物想象力": 0,
    "美食哲学家": 0
  };
  
  document.getElementById("page-result").style.display = 'none';
  document.getElementById("page-result").classList.remove('active');
  
  startTest();
}
